<!DOCTYPE html>
<html>
<head>
  <title>COJBA Players</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    .players-container {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
      padding: 20px;
    }

    .player-card {
      background: #1e1e1e;
      padding: 15px;
      border-radius: 10px;
      width: 150px;
    }

    .player-card img {
      width: 100px;
      height: 100px;
      object-fit: cover;
      border-radius: 50%;
    }

    h1 {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<h1>COJBA Players</h1>

<div class="players-container">

  <div class="player-card">
    <img src="images/players/will-stafford.jpeg" alt="Will Stafford">
    <h3>Will Stafford</h3>
    <p>#1 - Guard</p>
  </div>

</div>

</body>
</html>
